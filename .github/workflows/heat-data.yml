name: heat data pipeline

# The whole pipeline in one workflow: fetch NDFD GRIB -> reformat into map-ready
# data -> commit -> deploy the DATA to Pages (the graphics-rig map consumes these
# GeoJSON URLs at runtime). The deploy is a separate JOB so it stays detachable:
# delete the `deploy` job and the fetch/clean/commit pipeline is untouched.
#
# (Previously the deploy lived in heat-publish.yml, chained via workflow_run.
# GitHub's Pages backend intermittently rejects deployments with a transient
# "Deployment failed, try again later" — so the deploy step here RETRIES.)
#
# Crons are UTC and shift an hour at DST. Odd :23 minutes dodge the top-of-hour
# cron rush that delays runs.
on:
  schedule:
    - cron: "23 9 * * *"    # 5:23a ET summer / 4:23a winter — fresh for morning shows
    - cron: "23 15 * * *"   # 11:23a ET summer / 10:23a winter — midday refresh into peak heat
    - cron: "23 0 * * *"    # 8:23p ET summer / 7:23p winter — past the peak; map pivots to tomorrow
  workflow_dispatch: {}

# Serialize runs; never cancel one mid-commit/mid-deploy.
concurrency:
  group: heat-data
  cancel-in-progress: false

jobs:
  build-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # to commit the refreshed data
    steps:
      - uses: actions/checkout@v4

      - name: System eccodes (pygrib needs the C library)
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python + heat deps
        run: |
          uv python install 3.13
          uv sync --extra heat

      # Reference geographies are committed (built once, refreshed ~yearly).
      # Rebuild here only if missing, so normal runs stay fast.
      - name: Ensure reference geographies
        run: |
          test -f data/reference/places.csv     || uv run python scripts/make_reference.py --skip-counties
          test -f data/reference/counties.geojson || uv run python scripts/make_reference.py

      - name: Fetch NDFD (maxt + apt, CONUS + AK + HI)
        run: uv run python scripts/fetch_ndfd.py --area conus,alaska,hawaii --elements maxt,apt

      - name: Reformat into map-ready data
        run: |
          uv run python scripts/build_heat.py --product temp      --mode both --decimate 2
          uv run python scripts/build_heat.py --product feelslike --mode both --decimate 2 --tz America/Chicago
          uv run python scripts/build_heat.py --product warmnight --mode both --decimate 2 --tz America/Chicago

      - name: Commit latest data
        run: |
          git config user.name  "heat-bot"
          git config user.email "heat-bot@users.noreply.github.com"
          # Raw GRIB stays uncommitted (binary, reproducible); only the data products
          # and reference geographies are tracked — see .gitignore exceptions.
          git add data/reference data/processed
          git diff --cached --quiet || git commit -m "heat data $(date -u +%FT%TZ)"
          # main may have moved since checkout (a code push mid-run) — rebase our
          # data commit on top, then push. Retry once in case of a fresh race.
          git pull --rebase origin main
          git push || (sleep 10 && git pull --rebase origin main && git push)

      # Publish ONLY the data. This repo is a headless data engine — the map
      # lives in the graphics-rig, which fetches these GeoJSON URLs at runtime.
      - name: Assemble site (data only)
        run: |
          mkdir -p _site/data
          cp data/processed/*.geojson _site/data/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build-data
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url }}
    # Pages allows one live deployment at a time — serialize, never cancel.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      # The Pages backend intermittently answers "Deployment failed, try again
      # later" (a ~6-second server-side rejection, worst at cron rush hours).
      # Manual re-runs always succeed — so do the retry automatically.
      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 180

      - name: Deploy to GitHub Pages (retry)
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
