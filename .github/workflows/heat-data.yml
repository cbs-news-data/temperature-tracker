name: heat data pipeline

# Jobs 1 + 2: fetch NDFD GRIB, reformat into map-ready data, commit the latest
# data. This is the durable pipeline — it stands alone. The viewer/Pages deploy
# lives in heat-publish.yml and can be removed without touching this.
#
# NDFD refreshes through the day; run morning + afternoon (UTC) plus on demand.
on:
  schedule:
    - cron: "5 11 * * *"   # ~ early-morning ET update
    - cron: "5 20 * * *"   # ~ afternoon ET update (captures the day's hottest guidance)
  workflow_dispatch: {}

permissions:
  contents: write          # to commit the refreshed data

concurrency:
  group: heat-data
  cancel-in-progress: true

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: System eccodes (pygrib needs the C library)
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python + heat deps
        run: |
          uv python install 3.13
          uv sync --extra heat

      # Reference geographies are committed (built once, refreshed ~yearly).
      # Rebuild here only if missing, so normal runs stay fast.
      - name: Ensure reference geographies
        run: |
          test -f data/reference/places.csv     || uv run python scripts/make_reference.py --skip-counties
          test -f data/reference/counties.geojson || uv run python scripts/make_reference.py

      - name: Fetch NDFD (maxt + apt, CONUS + AK + HI)   # Job 1
        run: uv run python scripts/fetch_ndfd.py --area conus,alaska,hawaii --elements maxt,apt

      - name: Reformat into map-ready data    # Job 2
        run: |
          uv run python scripts/build_heat.py --product temp      --mode both --decimate 2
          uv run python scripts/build_heat.py --product feelslike --mode both --decimate 2 --tz America/Chicago
          uv run python scripts/build_heat.py --product warmnight --mode both --decimate 2 --tz America/Chicago

      - name: Commit latest data
        run: |
          git config user.name  "heat-bot"
          git config user.email "heat-bot@users.noreply.github.com"
          # Raw GRIB stays uncommitted (binary, reproducible); only the data products
          # and reference geographies are tracked — see .gitignore exceptions.
          git add data/reference data/processed
          git diff --cached --quiet || git commit -m "heat data $(date -u +%FT%TZ)"
          git push
