<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NDFD heat forecast</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.js"></script>
<style>
  html,body,#map{height:100%;margin:0}
  body{font:14px/1.4 -apple-system,Segoe UI,Roboto,sans-serif}
  #panel{position:absolute;top:12px;left:12px;z-index:1;background:#fff;
         padding:11px 12px;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.25);
         width:236px;max-width:calc(100vw - 24px);max-height:calc(100vh - 24px);
         overflow-y:auto;-webkit-overflow-scrolling:touch}
  #phead{display:flex;align-items:center;justify-content:space-between;gap:8px}
  #panel h1{font-size:20px;line-height:1.15;margin:0}
  #status{display:none;font-size:12px;color:#555;margin-top:2px}
  #panel.collapsed #status{display:block}
  #collapse{border:1px solid #ddd;background:#f2f2f2;border-radius:16px;font-size:14px;font-weight:600;
            line-height:1;cursor:pointer;color:#444;padding:8px 13px;white-space:nowrap;flex:0 0 auto}
  #controls{margin-top:6px}
  #panel.collapsed{width:auto}
  #panel.collapsed #controls{display:none}
  #panel label{display:block;margin:10px 0 3px;font-weight:600;font-size:12px;color:#333}
  #panel label[for="search"]{font-size:15px;color:#111}
  select,#search{width:100%;box-sizing:border-box;font-size:16px;padding:9px;
         border:1px solid #ccc;border-radius:6px;background:#fff}
  .seg{display:flex;gap:6px;margin-top:2px}
  .seg.col{flex-direction:column}
  .seg button{flex:1;min-height:42px;padding:8px;font-size:13px;border:1px solid #ccc;
         background:#f7f7f7;border-radius:6px;cursor:pointer}
  .seg button.on{background:#7f0000;color:#fff;border-color:#7f0000}
  .seg button .sub{display:block;font-size:10px;font-weight:400;opacity:.8;margin-top:1px}
  #legend{margin-top:10px;font-size:11px}
  #legend i{display:inline-block;width:14px;height:14px;margin-right:4px;vertical-align:-2px}
  #meta{margin-top:8px;font-size:11px;color:#666}
  #searchwrap{position:relative}
  #results{position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid #ccc;
           border-top:none;max-height:240px;overflow:auto;z-index:2;display:none;border-radius:0 0 6px 6px}
  #results div{padding:9px 10px;cursor:pointer;border-bottom:1px solid #eee;font-size:14px}
  #results div:last-child{border-bottom:none}
  #results div:hover,#results div.active{background:#f0e6e6}
  #results .none{color:#999;cursor:default}
  /* Mobile: dock the panel as a TOP sheet (over Canada/ocean, not the hot data),
     collapsed to an obvious slim bar; measure buttons go in a row. */
  @media (max-width:560px){
    #panel{top:0;bottom:auto;left:0;right:0;width:auto;max-width:none;
           max-height:64vh;border-radius:0 0 14px 14px;padding:8px 16px 12px;
           animation:drawerNudge 0.9s ease 0.6s 1}   /* one gentle bob on load to say "I open" */
    @keyframes drawerNudge{0%,100%{transform:translateY(0)}45%{transform:translateY(7px)}}
    @media (prefers-reduced-motion:reduce){ #panel{animation:none} }
    #panel::after{content:"";display:block;width:40px;height:4px;border-radius:2px;
           background:#ccc;margin:10px auto 2px}        /* pull-down handle at the bar's bottom */
    #phead{cursor:pointer}                              /* tap the whole header to open/close */
    #panel.collapsed{max-height:none;padding:10px 16px 12px}   /* slim (but obvious) bar when closed */
    #panel.collapsed h1{font-size:17px}
    #panel.collapsed #status{font-size:13px}
    #panel h1{font-size:18px}
    .seg.col{flex-direction:row}
    #results{max-height:50vh}
  }
</style>
</head>
<body>
<div id="panel">
  <div id="phead">
    <div><h1 id="title">U.S. heat forecast</h1><div id="status"></div></div>
    <button id="collapse" aria-label="Hide or show controls" title="Hide/show">Hide ⌃</button>
  </div>
  <div id="controls">
    <label for="search">Find a place</label>
    <div id="searchwrap">
      <input id="search" type="text" placeholder="Search a city or town — incl. Alaska & Hawaii" autocomplete="off"/>
      <div id="results"></div>
    </div>
    <label>Measure</label>
    <div class="seg col" id="measure">
      <button data-m="temp" class="on">High temp</button>
      <button data-m="feelslike">Feels like<span class="sub">Danger levels</span></button>
      <button data-m="warmnight">Overnight low</button>
    </div>
    <label>Layer</label>
    <div class="seg">
      <button id="b-geo" class="on">Counties</button>
      <button id="b-dots">Places</button>
    </div>
    <label for="day">Day</label>
    <select id="day"></select>
    <div id="legend"></div>
    <div id="meta">Source: NOAA/NWS NDFD. °F.<br>Map by John Kelly, CBS News</div>
  </div>
</div>
<div id="map"></div>
<script>
// Job 3 (presentation) reads only the files Job 2 writes. DATA_BASE points at them:
//  - Deployed (GitHub Pages): site root holds index.html + data/  -> default "data".
//  - Local: serve the repo root, then open  index.html?data=../data/processed
const DATA_BASE = new URLSearchParams(location.search).get('data') || 'data';

// Bands are [minF, label, color]; `below` colors anything under the first band.
// Temperature: 10° bands through the 80s (50s/60s blue, 70s green, 80s one orange),
// then 5° increments once it gets hot. Empty labels -> the legend shows the range.
const TEMP_BANDS=[[50,'','#74add1'],[60,'','#abd9e9'],[70,'','#e8f5b0'],[80,'','#fb8c00'],
                  [90,'','#f4511e'],[95,'','#e53935'],[100,'','#c1161b'],[105,'','#9c1414'],[110,'','#6d0000']];
// Feels-like is NWS apparent temperature = the Heat Index when hot, so it carries the
// NWS Heat Index categories (below 80°F is not classified). Temperature is raw air
// temp — deliberately NOT given danger categories.
const HEAT_INDEX_BANDS=[[80,'Caution','#f6e463'],[90,'Extreme Caution','#f2a93b'],
                        [103,'Danger','#e0392b'],[125,'Extreme Danger','#8e1e8e']];
const DATASETS = {
  temp:      {prefix:'heat', title:'Forecast temperature (daytime high)',
              below:'#2c7bb6', bands:TEMP_BANDS},
  feelslike: {prefix:'feelslike', title:'Feels-like temperature (daytime high)',
              below:'#b9d9ec', bands:HEAT_INDEX_BANDS, note:'NWS Heat Index (apparent temp)'},
  warmnight: {prefix:'warmnight', title:'Warm nights (overnight feels-like low)',
              below:'#2c7bb6',  // 10° bands, same colors as the daytime scale for consistency
              bands:[[50,'','#74add1'],[60,'','#abd9e9'],[70,'','#e8f5b0'],[80,'','#fb8c00'],[90,'','#f4511e']]}
};
const EMPTY = {type:'FeatureCollection',features:[]};

// Map paint for the current `day`: a stepped scale for categorical measures
// (feels-like → Heat Index bands), else continuous interpolation over stops.
function paintColor(ds){
  if(ds.bands){ const e=['step',['get',day],ds.below]; ds.bands.forEach(([t,,c])=>e.push(t,c)); return e; }
  const e=['interpolate',['linear'],['get',day]]; ds.stops.forEach(([t,c])=>e.push(t,c)); return e;
}
// Hide no-data features for the current day instead of painting them the coldest color.
const hasValue = (day) => ['all',['has',day],['!=',['get',day],null]];

// Match the map's color for a value (same stops + linear interpolation) so popup
// swatches correspond to the legend / the dot or county on the map.
function hexToRgb(h){h=h.replace('#','');return [0,2,4].map(i=>parseInt(h.slice(i,i+2),16));}
function colorForValue(v,stops){
  if(v==null||isNaN(v)) return null;
  if(v<=stops[0][0]) return stops[0][1];
  const last=stops[stops.length-1]; if(v>=last[0]) return last[1];
  for(let i=0;i<stops.length-1;i++){
    const [t0,c0]=stops[i],[t1,c1]=stops[i+1];
    if(v>=t0&&v<=t1){const f=(v-t0)/(t1-t0),a=hexToRgb(c0),b=hexToRgb(c1);
      return `rgb(${a.map((x,k)=>Math.round(x+(b[k]-x)*f)).join(',')})`;}
  }
  return last[1];
}
// NWS Heat Index band for a value (categorical measures only): [minF,name,color] or null.
function bandFor(v,ds){ if(!ds.bands||v==null||isNaN(v)) return null; let hit=null; for(const b of ds.bands) if(v>=b[0]) hit=b; return hit; }
function swatchColor(v,ds){ if(v==null||isNaN(v)) return null; if(ds.bands){ const b=bandFor(v,ds); return b?b[2]:ds.below; } return colorForValue(v,ds.stops); }

const basemap = {version:8,
  sources:{carto:{type:'raster',tiles:['https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'],
    tileSize:256,attribution:'© OpenStreetMap, © CARTO'}},
  layers:[{id:'bg',type:'raster',source:'carto'}]};

const map=new maplibregl.Map({container:'map',style:basemap,center:[-97,38],zoom:3.6});
map.addControl(new maplibregl.NavigationControl(), 'bottom-right');  // clear of the top panel
const IS_MOBILE = window.matchMedia && window.matchMedia('(max-width:560px)').matches;

// Counties give the clean national overview; dots are for drill-down ("find my town").
let measure='temp', layer='geo', day='day1', days=[];
const cache={};  // prefix -> {pts, cty}
let placeIndex=[];  // [{label, coords:[lon,lat], props}] for the search box

// no-cache = always revalidate with the server (cheap 304 when unchanged, fresh
// when the twice-daily data updates) so the viewer never shows stale forecasts.
async function fetchJSON(url){ return fetch(url,{cache:'no-cache'}).then(r=>r.ok?r.json():EMPTY).catch(()=>EMPTY); }
async function fetchDataset(prefix){
  if(cache[prefix]) return cache[prefix];
  const [pts,cty]=await Promise.all([
    fetchJSON(`${DATA_BASE}/${prefix}_points.geojson`),
    fetchJSON(`${DATA_BASE}/${prefix}_counties.geojson`),
  ]);
  return cache[prefix]={pts,cty};
}

// Day list comes from the points metadata; fall back to county feature keys
// (day1, day2, …) so the viewer still works for a counties-only product.
function dayList(pts,cty){
  if(pts.metadata&&pts.metadata.days) return pts.metadata.days;
  const f=(cty.features||[])[0];
  const keys=f?Object.keys(f.properties).filter(k=>/^day\d+$/.test(k)):[];
  return keys.length?keys.sort((a,b)=>+a.slice(3)-+b.slice(3)).map(k=>({key:k})):[{key:'day1'}];
}

// Human day labels from the forecast date: Today / Tomorrow / weekday + short date.
// Derived from fcst_date, NOT the dayN index — NDFD can drop "today" mid-day, so
// day1's date may actually be tomorrow.
function dayLabel(iso){
  if(!iso) return '';
  const d=new Date(iso+'T00:00:00');
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.round((d-today)/86400000);
  const rel = diff===0 ? 'Today' : diff===1 ? 'Tomorrow'
            : d.toLocaleDateString(undefined,{weekday:'long'});
  return `${rel} · ${d.toLocaleDateString(undefined,{month:'short',day:'numeric'})}`;
}
function labelFor(key){ const d=days.find(x=>x.key===key); return d&&d.fcst_date?dayLabel(d.fcst_date):key; }

// Popup body: the full forecast for a place — one row per day, current day bold.
function popupHTML(name, props){
  const ds=DATASETS[measure];
  const rows=days.map(d=>{
    const v=props[d.key];
    const on=d.key===day?' style="font-weight:600"':'';
    const sw=v==null?'':`<span style="display:inline-block;width:11px;height:11px;`+
             `background:${swatchColor(v,ds)};border:1px solid #999;margin-right:5px;vertical-align:-1px"></span>`;
    const b=bandFor(v,ds); const cat=(b&&b[1])?` <span style="color:#666">· ${b[1]}</span>`:'';
    return `<tr${on}><td style="padding-right:10px">${labelFor(d.key)}</td>`+
           `<td style="text-align:right;white-space:nowrap">${sw}${v==null?'n/a':v+'°F'}${cat}</td></tr>`;
  }).join('');
  return `<b>${name}</b><div style="font-size:11px;color:#666">${ds.title}</div>`+
         `<table style="margin-top:4px;border-collapse:collapse;font-size:12px">${rows}</table>`;
}

map.on('load', async ()=>{
  // On phones the panel docks at the top; pad the camera so the US data frames
  // below the collapsed bar instead of hiding under it.
  if(IS_MOBILE) map.setPadding({top:64,bottom:0,left:0,right:0});
  map.addSource('pts',{type:'geojson',data:EMPTY});
  map.addSource('cty',{type:'geojson',data:EMPTY});
  map.addLayer({id:'geo',type:'fill',source:'cty',
    paint:{'fill-opacity':0.75,'fill-outline-color':'#999'}});
  map.addLayer({id:'dots',type:'circle',source:'pts',layout:{visibility:'none'},
    // No outline (uniform at every zoom) and a slightly larger radius; dots may
    // overlap and just paint over each other into a field, rather than fading edges.
    paint:{'circle-radius':['interpolate',['linear'],['zoom'],3,2.5,7,6],
           'circle-opacity':0.9}});
  popup('dots'); popup('geo');
  setLayer('geo');
  await setMeasure('temp');
});

async function setMeasure(m){
  measure=m;
  document.querySelectorAll('#measure button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  const ds=DATASETS[m];
  const {pts,cty}=await fetchDataset(ds.prefix);
  map.getSource('pts').setData(pts);
  map.getSource('cty').setData(cty);
  buildIndex(pts);
  days=dayList(pts,cty);
  const sel=document.getElementById('day');
  const prev=day;
  sel.innerHTML='';
  days.forEach(d=>{const o=document.createElement('option');o.value=d.key;
    const thin=(d.n_hours!==undefined&&d.n_hours<6)?` ⚠${d.n_hours}h`:'';
    o.textContent=`${dayLabel(d.fcst_date)||d.key}${thin}`; sel.appendChild(o);});
  day=days.some(d=>d.key===prev)?prev:days[0].key;
  sel.value=day;
  paint(); legend();
}
const MEASURE_SHORT={temp:'Temperature',feelslike:'Feels like',warmnight:'Warm nights'};
function updateStatus(){  // the tiny line shown on the collapsed mobile drawer
  document.getElementById('status').textContent=`${MEASURE_SHORT[measure]} — ${labelFor(day)}`;
}
function paint(){
  const ds=DATASETS[measure];
  for(const id of ['dots','geo']){
    map.setFilter(id, hasValue(day));
    map.setPaintProperty(id, id==='dots'?'circle-color':'fill-color', paintColor(ds));
  }
  updateStatus();
}
function setLayer(l){ layer=l;
  document.getElementById('b-dots').classList.toggle('on',l==='dots');
  document.getElementById('b-geo').classList.toggle('on',l==='geo');
  map.setLayoutProperty('dots','visibility',l==='dots'?'visible':'none');
  map.setLayoutProperty('geo','visibility',l==='geo'?'visible':'none');
}
function popup(id){
  map.on('click',id,e=>{const p=e.features[0].properties;
    const nm=p.name_state??p.name_display??p.name??p.NAME??p.NAMELSAD??'';
    new maplibregl.Popup().setLngLat(e.lngLat).setHTML(popupHTML(nm, p)).addTo(map);});
  map.on('mouseenter',id,()=>map.getCanvas().style.cursor='pointer');
  map.on('mouseleave',id,()=>map.getCanvas().style.cursor='');
}
function legend(){
  const ds=DATASETS[measure], el=document.getElementById('legend');
  if(ds.bands){
    let rows = ds.below?`<div><i style="background:${ds.below}"></i>&lt; ${ds.bands[0][0]}°F</div>`:'';
    rows += ds.bands.map((b,i)=>{
      const hi=ds.bands[i+1]?ds.bands[i+1][0]:null;
      const range=hi?`${b[0]}–${hi}`:`${b[0]}+`;
      const label=b[1]?`${b[1]} (${range}°F)`:`${range}°F`;
      return `<div><i style="background:${b[2]}"></i>${label}</div>`;
    }).join('');
    el.innerHTML=rows+(ds.note?`<div style="color:#666;margin-top:4px">${ds.note}</div>`:'');
  } else {
    el.innerHTML=ds.stops.map(([t,c])=>`<div><i style="background:${c}"></i>${t}°F</div>`).join('');
  }
}

// ---- place search (client-side, over the points already loaded) ----
function buildIndex(pts){
  placeIndex=(pts.features||[]).map(f=>({
    label:f.properties.name_state||f.properties.name_display||f.properties.name||'',
    coords:f.geometry.coordinates, props:f.properties,
  })).filter(p=>p.label);
}
function runSearch(q){
  const box=document.getElementById('results');
  q=q.trim().toLowerCase();
  if(q.length<2){box.style.display='none';box.innerHTML='';box._hits=[];return;}
  const starts=[], contains=[];
  for(const p of placeIndex){
    const l=p.label.toLowerCase();
    if(l.startsWith(q)) starts.push(p);
    else if(l.includes(q)) contains.push(p);
    if(starts.length>=8) break;
  }
  const hits=starts.concat(contains).slice(0,8);
  box._hits=hits;
  box.innerHTML=hits.length
    ? hits.map((p,i)=>`<div data-i="${i}">${p.label}</div>`).join('')
    : '<div class="none">No match</div>';
  box.style.display='block';
}
function selectPlace(p){
  if(!p) return;
  document.getElementById('search').value=p.label;
  const box=document.getElementById('results'); box.style.display='none';
  setLayer('dots');                          // reveal the Places layer
  map.flyTo({center:p.coords, zoom:9});
  new maplibregl.Popup().setLngLat(p.coords).setHTML(popupHTML(p.label, p.props)).addTo(map);
}

document.querySelectorAll('#measure button').forEach(b=>b.onclick=()=>setMeasure(b.dataset.m));
document.getElementById('day').onchange=e=>{day=e.target.value;paint();};
document.getElementById('b-dots').onclick=()=>setLayer('dots');
document.getElementById('b-geo').onclick=()=>setLayer('geo');
function setCollapsed(on){
  document.getElementById('panel').classList.toggle('collapsed', on);
  document.getElementById('collapse').textContent = on ? 'Controls ⌄' : 'Hide ⌃';
}
// Tap anywhere on the header (title or arrow) to open/close the drawer.
document.getElementById('phead').onclick=()=>
  setCollapsed(!document.getElementById('panel').classList.contains('collapsed'));
// On phones the drawer starts collapsed so the map owns the screen; tap to reveal.
if(IS_MOBILE) setCollapsed(true);

const searchEl=document.getElementById('search'), resultsEl=document.getElementById('results');
searchEl.oninput=e=>runSearch(e.target.value);
searchEl.onkeydown=e=>{ if(e.key==='Enter'){ selectPlace((resultsEl._hits||[])[0]); }
                       else if(e.key==='Escape'){ resultsEl.style.display='none'; } };
resultsEl.onclick=e=>{ const d=e.target.closest('div[data-i]');
                       if(d) selectPlace(resultsEl._hits[+d.dataset.i]); };
// close the dropdown when clicking elsewhere
document.addEventListener('click',e=>{ if(!e.target.closest('#searchwrap')) resultsEl.style.display='none'; });
</script>
</body>
</html>
